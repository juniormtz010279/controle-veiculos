<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle - Vanguard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    position: relative;
    background: linear-gradient(to right, #2c3e50, #1abc9c);
    color: white;
    padding: 20px;
    text-align: center;
}

.logo {
    width: 100px;
}

.btn-sair {
    position: absolute;
    right: 15px;
    top: 15px;
    padding: 5px 10px;
    font-size: 12px;
    background: #e74c3c;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.container {
    padding: 15px;
}

select {
    width: 100%;
    padding: 10px;
    font-size: 13px;
}

.detalhes {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
}

.campo-km {
    width: 130px;
    padding: 6px;
    font-size: 13px;
}

.campo-texto {
    width: 100%;
    height: 140px;
    font-size: 13px;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
    <button class="btn-sair" onclick="sair()">Sair</button>
    <img src="Vanguard.png" class="logo">
    <h3>Controle de Óleo e Pneu</h3>
</header>

<div class="container">

<h3>Selecionar Veículo</h3>
<select id="selectPlaca" onchange="abrirSelecionado()"></select>

<div id="areaDetalhes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyALBzF2mCjksABQUteZY8iTS0RBubMAy_Q",
  authDomain: "controle-veiculos-a0021.firebaseapp.com",
  projectId: "controle-veiculos-a0021",
  storageBucket: "controle-veiculos-a0021.firebasestorage.app",
  messagingSenderId: "994564065503",
  appId: "1:994564065503:web:3e15217d06b3b3f309816a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// VEÍCULOS
let placasFixas = [
{ placa: "TCW-4H79", motorista: "WANDER" },
{ placa: "TCW-4H82", motorista: "RENATO" },
{ placa: "TCW-8B75", motorista: "WILDER" },
{ placa: "TCZ-0B74", motorista: "VINICIUS" },
{ placa: "TDD-0F32", motorista: "KEKE" },
{ placa: "TDB-9B52", motorista: "ROGERSON" },
{ placa: "SYL-8F21", motorista: "EDILSON" },
{ placa: "SYK-4H02", motorista: "FREDERICO" },
{ placa: "RUD-1E29", motorista: "DOKINHA" },
{ placa: "RUC-2A69", motorista: "DEYVERSON" },
{ placa: "RUC-2A74", motorista: "CLAUDINEI" },
{ placa: "RTF-4A07", motorista: "WELLINGTON" },
{ placa: "RTF-4A09", motorista: "GABRIEL" },
{ placa: "RTF-4A11", motorista: "TUNICO" },
{ placa: "RFY-6A32", motorista: "ZEZE" },
{ placa: "TZK-1D67", motorista: "DENER" }
];

let dados = [];

// FORMATAR KM
function formatarKM(valor) {
    return Number(valor).toLocaleString('pt-BR');
}

function limparKM(valor) {
    return valor.replace(/\./g, '');
}

// CARREGAR
async function carregarDados() {

    const querySnapshot = await getDocs(collection(db, "veiculos"));

    dados = [];

    querySnapshot.forEach((docSnap) => {
        dados.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    iniciar();
}

// INICIAR
async function iniciar() {

    let select = document.getElementById("selectPlaca");

    let options = `<option value="">Selecione</option>`;

    let listaOrdenada = [];

    for (let veiculo of placasFixas) {

        // PROCURA SOMENTE PELA PLACA
        let item = dados.find(v =>
            v.placa &&
            v.placa.startsWith(veiculo.placa)
        );

        // SE NÃO EXISTIR CRIA
        if (!item) {

            const novo = await addDoc(collection(db, "veiculos"), {
                placa: veiculo.placa,
                motorista: veiculo.motorista,
                oleo: "",
                pneu: "",
                descOleo: "",
                descPneu: ""
            });

            item = {
                id: novo.id,
                placa: veiculo.placa,
                motorista: veiculo.motorista,
                oleo: "",
                pneu: "",
                descOleo: "",
                descPneu: ""
            };

        } else {

            // ATUALIZA MOTORISTA AUTOMATICAMENTE
                item.placa = veiculo.placa;
		item.motorista = veiculo.motorista;

        }

        listaOrdenada.push(item);
    }

    dados = listaOrdenada;

    // COMBOBOX
    dados.forEach((item, index) => {

        options += `
        <option value="${index}">
            ${item.placa} - ${item.motorista || ''}
        </option>
        `;
    });

    select.innerHTML = options;
}

// ABRIR
window.abrirSelecionado = function () {

    let index = document.getElementById("selectPlaca").value;

    if (index === "") return;

    let item = dados[index];

    let kmOleo = item.oleo ? formatarKM(item.oleo) : "";

    let proxima = item.oleo
        ? formatarKM(Number(item.oleo) + 40000)
        : "";

    document.getElementById("areaDetalhes").innerHTML = `

    <div class="detalhes">

        <h4>${item.placa}</h4>

        <div>
            <strong>Motorista:</strong>
            ${item.motorista || ''}
        </div>

        <br>

        KM Óleo:<br>

        <input
            class="campo-km"
            id="oleo"
            value="${kmOleo}"
            oninput="formatarCampo(this)"
        >

        <div>
            Próxima troca:
            <strong id="proxima">${proxima}</strong>
        </div>

        <br>

        Descrição Óleo:<br>

        <textarea
            class="campo-texto"
            id="descOleo"
        >${item.descOleo || ''}</textarea>

        <br><br>

        KM Pneu:<br>

        <input
            class="campo-km"
            id="pneu"
            value="${item.pneu ? formatarKM(item.pneu) : ''}"
            oninput="formatarCampo(this)"
        >

        <br><br>

        Descrição Pneu:<br>

        <textarea
            class="campo-texto"
            id="descPneu"
        >${item.descPneu || ''}</textarea>

        <br><br>

        <button onclick="salvar(${index})">
            Salvar
        </button>

    </div>
    `;
}

// FORMATAR AO DIGITAR
window.formatarCampo = function(campo) {

    let valor = limparKM(campo.value);

    if (!isNaN(valor) && valor !== '') {
        campo.value = formatarKM(valor);
    }

    if (campo.id === "oleo") {

        let proxima = document.getElementById("proxima");

        if (valor !== '') {
            proxima.innerText =
                formatarKM(Number(valor) + 40000);
        } else {
            proxima.innerText = "";
        }
    }
}

// SALVAR
window.salvar = async function(index) {

    let item = dados[index];

    await updateDoc(doc(db, "veiculos", item.id), {

        motorista: item.motorista,

        oleo: limparKM(
            document.getElementById("oleo").value
        ),

        pneu: limparKM(
            document.getElementById("pneu").value
        ),

        descOleo:
            document.getElementById("descOleo").value,

        descPneu:
            document.getElementById("descPneu").value
    });

    alert("Salvo na nuvem!");
}

// SAIR
window.sair = function () {

    if (confirm("Deseja sair?")) {
        window.location.href = "index.html";
    }
}

// START
carregarDados();

</script>

</body>
</html>
