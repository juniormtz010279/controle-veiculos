<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Vanguard Transportes</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
    }

    /* LADO ESQUERDO */
    .lado-esquerdo {
        width: 60%;
        display: flex;
        flex-direction: column;
    }

    .imagem {
        flex: 1;
        background-size: cover;
        background-position: center;
        position: relative;
    }

    .imagem::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }

    .oleo {
        background: url('oleo.jpg') no-repeat center;
        background-size: cover;
    }

    .pneu {
        background: url('pneu.jpg') no-repeat center;
        background-size: cover;
    }

    /* LADO DIREITO */
    .lado-direito {
        width: 40%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to right, #2c3e50, #1abc9c);
    }

    .login-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 12px;
        width: 90%;
        max-width: 350px;
        text-align: center;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
    }

    .login-box img {
        width: 120px;
        margin-bottom: 10px;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #1abc9c;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 16px;
        border-radius: 5px;
        margin-top: 10px;
    }

    button:hover {
        background: #16a085;
    }

    .erro {
        color: red;
        margin-top: 10px;
    }

    .subtitulo {
        font-size: 12px;
        color: #555;
        margin-bottom: 5px;
    }

    /* 📱 RESPONSIVO */
    @media (max-width: 768px) {
        body {
            flex-direction: column;
        }

        .lado-esquerdo {
            width: 100%;
            height: 250px;
        }

        .lado-direito {
            width: 100%;
            height: calc(100vh - 250px);
        }

        .login-box {
            box-shadow: none;
            border-radius: 0;
        }
    }
</style>
</head>

<body>

<!-- IMAGENS -->
<div class="lado-esquerdo">
    <div class="imagem oleo"></div>
    <div class="imagem pneu"></div>
</div>

<!-- LOGIN -->
<div class="lado-direito">
    <div class="login-box">

        <img src="Vanguard.png">

        <p class="subtitulo">Controle de troca de Óleo e Pneu dos Veículos</p>

        <h2>Vanguard Transportes</h2>

        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <div class="erro" id="erro"></div>

    </div>
</div>

<script>

// 🔐 LOGIN
function login() {
    let usuario = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;

    if (usuario === "denis" && senha === "12345") {
        window.location.href = "controle.html";
    } else {
        document.getElementById("erro").innerText = "Usuário ou senha inválidos";
    }
}

// ⌨️ ENTER PARA LOGAR
document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        login();
    }
});

// 🔄 LIMPA ERRO AO DIGITAR
document.getElementById("usuario").addEventListener("input", () => {
    document.getElementById("erro").innerText = "";
});
document.getElementById("senha").addEventListener("input", () => {
    document.getElementById("erro").innerText = "";
});

</script>

</body>
</html>
